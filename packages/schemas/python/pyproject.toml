[project]
name = "fpg-schemas"
version = "0.0.1"
description = "Canonical domain schemas for FPG (Python): validation + geometry. Source of truth lives in ../schemas/*.json."
requires-python = ">=3.12"
dependencies = ["jsonschema>=4.23"]

[project.optional-dependencies]
dev = [
  "pytest>=8.3",
  "ruff>=0.8",
  "mypy>=1.13",
  "datamodel-code-generator>=0.26",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["fpg_schemas"]

[tool.mypy]
python_version = "3.12"

[[tool.mypy.overrides]]
module = ["jsonschema.*", "referencing.*"]
ignore_missing_imports = true
