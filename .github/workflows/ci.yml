name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  js:
    name: JS (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  python:
    name: Python (ruff, mypy, pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - apps/api
          - services/generator
          - services/codes
          - services/validator
          - services/geometry
          - services/export
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        working-directory: ${{ matrix.service }}
        run: |
          uv venv
          uv pip install -e ".[dev]"
      - name: Ruff
        working-directory: ${{ matrix.service }}
        run: uv run ruff check .
      - name: Mypy
        working-directory: ${{ matrix.service }}
        run: uv run mypy app
      - name: Pytest
        working-directory: ${{ matrix.service }}
        run: uv run pytest -q

  codegen-drift:
    name: Schema codegen drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Regenerate the committed TS types/consts from packages/schemas and fail on any diff.
      # FPG_SKIP_PY keeps this deterministic (Pydantic models are generated on demand, not committed).
      - run: FPG_SKIP_PY=1 pnpm codegen
      - name: Fail if codegen produced changes
        run: git diff --exit-code

  schemas-python:
    name: Schemas (Python validation + geometry)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        working-directory: packages/schemas/python
        run: |
          uv venv
          uv pip install -e ".[dev]"
      - name: Ruff
        working-directory: packages/schemas/python
        run: uv run ruff check .
      - name: Mypy
        working-directory: packages/schemas/python
        run: uv run mypy fpg_schemas
      - name: Pytest
        working-directory: packages/schemas/python
        run: uv run pytest -q
      - name: Pydantic codegen smoke (datamodel-code-generator)
        working-directory: packages/schemas
        run: uv run --with datamodel-code-generator datamodel-codegen --input schemas --input-file-type jsonschema --output gen/python/models.py --output-model-type pydantic_v2.BaseModel --target-python-version 3.12

  docker:
    name: Docker builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose
        run: docker compose -f infra/docker-compose.yml config -q
      - name: Build api image
        run: docker build -f apps/api/Dockerfile .
      - name: Build web image
        run: docker build -f apps/web/Dockerfile .

  api-client:
    name: Typed API client (OpenAPI -> TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install api
        working-directory: apps/api
        run: |
          uv venv
          uv pip install -e ".[dev]"
      - name: Export OpenAPI
        working-directory: apps/api
        run: uv run python scripts/export_openapi.py openapi.json
      - name: Generate TS client
        working-directory: apps/api
        run: npx -y openapi-typescript@7 openapi.json -o client.d.ts
      - name: Sanity-check generated client
        working-directory: apps/api
        run: test -s client.d.ts && grep -q "paths" client.d.ts
