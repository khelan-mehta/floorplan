# Root Python tooling config shared by all services (each service has its own pyproject for deps).
[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["**/gen/**", ".venv", "**/__pycache__"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C4", "SIM", "ASYNC", "RUF"]
# E501: line length handled by formatter. B008: FastAPI's Depends()/Body() default idiom.
ignore = ["E501", "B008"]

[tool.ruff.lint.isort]
known-first-party = ["app", "fpg_schemas"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_ignores = true
warn_redundant_casts = true
disallow_untyped_defs = true
plugins = ["pydantic.mypy"]
exclude = ["gen/", "\\.venv"]

[[tool.mypy.overrides]]
module = [
  "qdrant_client.*",
  "ifcopenshell.*",
  "ezdxf.*",
  "trimesh.*",
  "geoalchemy2.*",
  "arq.*",
  "prometheus_client.*",
  "asyncpg.*",
]
ignore_missing_imports = true

# SQLAlchemy's declarative attributes confuse strict mypy in a few model spots; keep models
# typed but pragmatic. (Routers/services remain strict.)
[[tool.mypy.overrides]]
module = ["app.models"]
disallow_any_generics = false
warn_return_any = false
